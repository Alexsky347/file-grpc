quarkus:
  application:
    name: drive-clone

  # File service gRPC client configuration
  grpc:
    clients:
      fileService:
        host: ${GRPC_HOST:localhost}
        port: ${GRPC_PORT:9100}
    server:
      use-separate-server: false
      enable-reflection-service: true

  # HTTP server configuration
  http:
    port: ${APP_PORT:8080}
    root-path: /api
    host: 0.0.0.0
    cors:
      enabled: true
      origins: "*"
      methods: GET,POST,PUT,DELETE,OPTIONS
      headers: Authorization,Content-Type
      access-control-allow-credentials: true
    body:
      handle-file-uploads: true
    limits:
      max-body-size: 10M
    auth:
      permission:
        permit-all:
          paths: /internal/*
          policy: permit

  # OpenAPI configuration
  smallrye-openapi:
    enabled: true

  # Logging configuration
  log:
    file:
      enabled: false
    console:
      level: DEBUG

  # OIDC configuration for Keycloak
  oidc:
    auth-server-url: ${OIDC_AUTH_SERVER_URL:http://localhost:8090/realms/doc-manager-realme}
    client-id: ${OIDC_CLIENT_ID:doc-manager-service}
    credentials:
      secret: ${OIDC_CLIENT_SECRET:VnKTomnge8m27xjsFkyB8rr9l4zgh9v5}
    application-type: service
    token:
      issuer: ${OIDC_TOKEN_ISSUER:http://localhost:8090/realms/doc-manager-realme}

  # Rest client logging configuration -> to change in production
  rest-client:
    logging:
      scope: request-response

# RustFS configuration (S3-compatible object storage)
grpc-file:
  rustfs:
    url: ${RUSTFS_URL:http://localhost:9010}
    access-key: ${RUSTFS_ACCESS_KEY:rustfsadmin}
    secret-key: ${RUSTFS_SECRET_KEY:rustfsadmin}
    bucket: ${RUSTFS_BUCKET:file-uploads}
    presigned-url-expiry: ${RUSTFS_PRESIGNED_EXPIRY:3600}  # 1 hour in seconds

